server:
  port: 8085
spring:
  application:
    name: user
  datasource:
    password: sachintha2002
    url: jdbc:postgresql://localhost:5432/BagifyUser
    username: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  zipkin:
    base-url: http://localhost:9411
  rabbitmq:
    addresses: localhost:5672
  profiles:
    active: default
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true

# CORS — explicitly listed so it's visible and overridable per environment
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000