server:
  port: 8083

spring:
  application:
    name: order
  datasource:
    url: jdbc:postgresql://localhost:5432/bagify_orders
    username: postgres
    password: sachintha2002
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true

# JWT secret MUST match the user service secret exactly
jwt:
  secret: bagify-super-secret-key-change-me-in-production-min-32-chars!!
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

# CORS — remove this once api-gateway is live (gateway handles CORS centrally)
cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:3000
